<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>{{ subject_name }} - Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#312e81">
    <link rel="stylesheet" href="{{ url_for('static', filename='aptx.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
          crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="quiz-page">
    <header class="quiz-topbar">
        <div class="topbar-inner">
            <a href="{{ url_for('dashboard') }}" class="back-btn" title="Quay về Dashboard">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="quiz-meta">
                <span class="meta-icon"><i class="{{ subject_icon }}"></i></span>
                <div>
                    <small>Bài kiểm tra</small>
                    <h1 id="subject-title">{{ subject_name }}</h1>
                </div>
            </div>
            <div class="topbar-actions">
                <a href="{{ url_for('chatbot_page', subject_slug=subject_slug) }}" class="btn-ghost">
                    <i class="fa-solid fa-robot"></i> <span>Hỏi chatbot</span>
                </a>
            </div>
        </div>
        <div class="progress-bar"><div class="progress"></div></div>
    </header>

    <div class="quiz-layout">

        <!-- Question navigator (mobile: ẩn lưới, mở bằng thanh kéo) -->
        <aside class="q-nav" id="q-nav">
            <button type="button" class="q-nav-pull" id="q-nav-pull"
                    aria-expanded="false" aria-controls="q-nav-panel">
                <span class="q-nav-handle-bar" aria-hidden="true"></span>
                <span class="q-nav-pull-main">
                    <i class="fa-solid fa-list-check" aria-hidden="true"></i>
                    <span class="q-nav-pull-col">
                        <span class="q-nav-pull-label">Danh sách câu</span>
                        <span class="q-nav-pull-meta" id="q-nav-pull-meta"></span>
                    </span>
                </span>
                <i class="fa-solid fa-chevron-down q-nav-pull-chevron" aria-hidden="true"></i>
            </button>
            <div id="q-nav-panel" class="q-nav-panel">
                <h3 class="q-nav-panel-heading"><i class="fa-solid fa-list-check"></i> Danh sách câu hỏi</h3>
                <div id="q-nav-grid" class="q-nav-grid"></div>
                <div class="q-nav-legend">
                    <span><i class="dot done"></i> Đã làm</span>
                    <span><i class="dot current"></i> Hiện tại</span>
                    <span><i class="dot pending"></i> Chưa làm / bỏ qua</span>
                </div>
            </div>
        </aside>

        <!-- Main quiz panel -->
        <main class="quiz-container">
            <div class="question-area"></div>
            <div class="navigation">
                <button type="button" class="nav-btn ghost" id="prevBtn" disabled>
                    <i class="fa-solid fa-chevron-left"></i> Trước
                </button>
                <div class="counter-wrap">
                    <div class="counter">
                        <span id="counter-current">1</span> / <span id="counter-total">0</span>
                    </div>
                    <p class="nav-skip-hint" id="nav-skip-hint">Có thể bỏ qua câu chưa trả lời.</p>
                </div>
                <button type="button" class="nav-btn" id="nextBtn">
                    Tiếp <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
            <div class="score-area" style="display:none;"></div>
        </main>
    </div>

    <!-- dialog -->
    <div id="dialog" class="dialog-backdrop" style="display:none;">
        <div class="dialog-content">
            <div class="dialog-icon"><i class="fa-solid fa-circle-info"></i></div>
            <div class="dialog-message" id="dialog-message"></div>
            <button class="dialog-btn" id="dialog-close">OK</button>
        </div>
    </div>

    <script>
        const QUESTIONS_URL = "{{ json_url }}";
        const SUBMIT_URL    = "{{ submit_url }}";
        const DASHBOARD_URL = "{{ url_for('dashboard') }}";
        const CHATBOT_URL   = "{{ url_for('chatbot_page', subject_slug=subject_slug) }}";
    </script>
    <script src="{{ url_for('static', filename='aptx.js') }}"></script>
</body>
</html>
